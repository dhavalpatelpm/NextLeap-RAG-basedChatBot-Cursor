# Phase 5: Daily data refresh at 10 AM UTC
# Runs Phase 1 (scrape + merge) → sync to course_details → Phase 2 (rebuild RAG)
# To run at 10 AM IST instead: change cron to '30 4 * * *'

name: Daily Data Refresh

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "numpy<2" -q
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run Phase 5 refresh
        run: python scripts/run_phase5_refresh.py
        env:
          # Optional: set GROQ_API_KEY if Phase 2/3 need it during refresh (Phase 2 does not)
          PYTHONUNBUFFERED: 1

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/course_details/ data/.last_refresh data/structured/ 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: daily refresh at $(date -u +%Y-%m-%d)"
            git push
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
